# Two stages:
#   1. quality        - lint and unit/API tests
#   2. train-and-serve - retrains the model from the committed data, builds
#                        the serving image and smoke tests it end-to-end,
#                        proving the whole pipeline is reproducible from a
#                        fresh checkout.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check src tests scripts

      - name: Run tests
        run: pytest

  train-and-serve:
    name: Train, build image & smoke test
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python -m src.train

      - name: Build serving image
        run: docker build -t sentiment-service .

      - name: Smoke test the container
        run: |
          docker run -d --name sentiment-service -p 8000:8000 sentiment-service
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health > /dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8000/health | grep -q '"model_loaded":true'
          curl -sf -X POST http://127.0.0.1:8000/predict \
            -H 'Content-Type: application/json' \
            -d '{"text": "Loved this book. The ending was disappointing though."}' \
            | grep -q '"overall_sentiment"'

      - name: Show container logs on failure
        if: failure()
        run: docker logs sentiment-service || true
